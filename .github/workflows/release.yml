name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_platform:
        description: 'Platforms to build from manual dispatch.'
        required: false
        default: 'windows'
        type: choice
        options:
          - windows
          - all
      lite_only:
        description: 'Test ONLY the EntropIA Lite MSIX (skip the Pro build + draft release).'
        required: false
        default: false
        type: boolean

env:
  PNPM_VERSION: 9.15.4
  MACOSX_DEPLOYMENT_TARGET: '10.15'
  CMAKE_OSX_DEPLOYMENT_TARGET: '10.15'
  # LEAN INSTALLER: the ~2.2GB ML runtime is NOT bundled (it overruns the NSIS/WiX
  # 2 GiB bundler limits). The app ships the tiny runtime-pack fixture and downloads
  # the real runtime at first launch from this ed25519-signed source, published by
  # the Publish Runtime Bootstrap workflow. These three vars are read at COMPILE time
  # via option_env!() (settings.rs) and pinned by build.rs rerun-if-env-changed.
  ENTROPIA_RUNTIME_BOOTSTRAP_MANIFEST_URL: https://github.com/HumaLab/EntropIA-Pro/releases/download/runtime-bootstrap/manifest.json
  ENTROPIA_RUNTIME_BOOTSTRAP_PUBLIC_KEY_ID: entropia-runtime-2026
  ENTROPIA_RUNTIME_BOOTSTRAP_PUBLIC_KEY_BASE64: fSt35Xo0XtpdZUH/Q2gsPm1drMZczLMQNcU6fqAEbi0=

jobs:
  build:
    name: Build ${{ matrix.name }}
    # Skipped when dispatched with lite_only=true (focused EntropIA Lite MSIX test).
    if: ${{ inputs.lite_only != true }}
    permissions:
      contents: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        # Default dispatch + tag pushes build Windows only. `all` adds macOS + Linux.
        include: ${{ fromJSON((github.event_name == 'push' || inputs.release_platform != 'all') && '[{"name":"windows-latest","platform":"windows-latest","build_args":"--bundles nsis","rust_target":""}]' || '[{"name":"windows-latest","platform":"windows-latest","build_args":"--bundles nsis","rust_target":""},{"name":"macos-14 (arm64)","platform":"macos-14","build_args":"--target aarch64-apple-darwin","rust_target":"aarch64-apple-darwin"},{"name":"ubuntu-22.04","platform":"ubuntu-22.04","build_args":"-- --no-default-features","rust_target":""}]') }}
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            pkg-config \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Install Rust target (macOS cross-compilation)
        if: matrix.rust_target != ''
        run: |
          rustup target add ${{ matrix.rust_target }}

      - name: Restore canonical lockfile
        run: git checkout -- pnpm-lock.yaml

      - name: Install frontend dependencies
        shell: pwsh
        run: npm exec --package=pnpm@${{ env.PNPM_VERSION }} -- pnpm install --frozen-lockfile

      # No runtime-pack injection: the committed fixture ships as-is so the app
      # detects "runtime not ready" and bootstraps it from the baked signed source.
      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pin the Pro frontend to local-ml=on (today this is unset and defaults to '1'
          # via the vite define; made explicit so the Pro behavior is locked).
          VITE_LOCAL_ML: '1'
          ENTROPIA_RUNTIME_BOOTSTRAP_MANIFEST_URL: ${{ env.ENTROPIA_RUNTIME_BOOTSTRAP_MANIFEST_URL }}
          ENTROPIA_RUNTIME_BOOTSTRAP_PUBLIC_KEY_ID: ${{ env.ENTROPIA_RUNTIME_BOOTSTRAP_PUBLIC_KEY_ID }}
          ENTROPIA_RUNTIME_BOOTSTRAP_PUBLIC_KEY_BASE64: ${{ env.ENTROPIA_RUNTIME_BOOTSTRAP_PUBLIC_KEY_BASE64 }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'EntropIA Pro ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download the EntropIA Pro installer for your platform. The local ML runtime downloads automatically on first launch.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.build_args }}

  # EntropIA-Lite MS-Store MSIX leg. Builds the LEAN app (no local-ml) into an MSI,
  # then repacks the vendored base MSIX (apps/desktop/src-tauri/msix/EntropIALite-base.msix)
  # with the freshly built exe + exact Store identity. Output is an UNSIGNED, Store-ready
  # MSIX uploaded as a build artifact (NOT to the GitHub release — Pro owns the release).
  # This job is independent from `build`; the Pro NSIS -> release flow above is unchanged.
  build-lite:
    name: Build EntropIA Lite MSIX
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Restore canonical lockfile
        run: git checkout -- pnpm-lock.yaml

      - name: Install frontend dependencies
        shell: pwsh
        run: npm exec --package=pnpm@${{ env.PNPM_VERSION }} -- pnpm install --frozen-lockfile

      # Build the lean MSI (local-ml compiled out via --no-default-features). The
      # bootstrap env vars are KEPT: build.rs guard_lean_bootstrap_source() is gated on
      # PROFILE=release + target_os, NOT on the cargo feature, so it still requires a
      # baked download source for the fixture runtime-pack present in the source tree.
      - name: Build lean Tauri MSI
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_LOCAL_ML: '0'
          ENTROPIA_RUNTIME_BOOTSTRAP_MANIFEST_URL: ${{ env.ENTROPIA_RUNTIME_BOOTSTRAP_MANIFEST_URL }}
          ENTROPIA_RUNTIME_BOOTSTRAP_PUBLIC_KEY_ID: ${{ env.ENTROPIA_RUNTIME_BOOTSTRAP_PUBLIC_KEY_ID }}
          ENTROPIA_RUNTIME_BOOTSTRAP_PUBLIC_KEY_BASE64: ${{ env.ENTROPIA_RUNTIME_BOOTSTRAP_PUBLIC_KEY_BASE64 }}
        with:
          # No release params: tauri-action only builds (does not create/touch a release).
          # tauri-action runs from the repo root, so --config is root-relative
          # (unlike the local `apps/desktop`-relative `src-tauri/...`).
          args: --config apps/desktop/src-tauri/tauri.lite.conf.json --bundles msi -- --no-default-features

      # Locate the freshly built lean exe. The Pro crate name is entropia-pro-desktop,
      # so the release binary is entropia-pro-desktop.exe; the repack renames it to
      # entropia-lite-desktop.exe inside the MSIX payload (matches the AppxManifest).
      - name: Locate lean exe and MSI
        id: artifacts
        shell: pwsh
        run: |
          $releaseDir = "apps/desktop/src-tauri/target/release"
          $exe = Get-ChildItem -Path $releaseDir -Filter "*.exe" -File |
            Where-Object { $_.Name -notmatch 'build-script|deps' } |
            Sort-Object Length -Descending |
            Select-Object -First 1
          if (-not $exe) { throw "No release exe found under $releaseDir" }
          $msi = Get-ChildItem -Path "$releaseDir/bundle/msi" -Filter "*.msi" -File -ErrorAction SilentlyContinue |
            Select-Object -First 1
          "exe_path=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          if ($msi) { "msi_path=$($msi.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append }
          Write-Host "Lean exe: $($exe.FullName) ($($exe.Length) bytes)"
          if ($msi) { Write-Host "MSI: $($msi.FullName)" }

      - name: Repack Store MSIX
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "${{ runner.temp }}/msix-out" -Force | Out-Null
          ./apps/desktop/src-tauri/scripts/repack-store-msix.ps1 `
            -BaseMsix "apps/desktop/src-tauri/msix/EntropIALite-base.msix" `
            -ExePath "${{ steps.artifacts.outputs.exe_path }}" `
            -OutDir "${{ runner.temp }}/msix-out" `
            -StoreVersion "1.0.5.0"

      - name: Upload EntropIA Lite MSIX
        uses: actions/upload-artifact@v4
        with:
          name: EntropIALite-msix
          path: ${{ runner.temp }}/msix-out/EntropIALite-Store-HLab-1.0.5.0.msix
          if-no-files-found: error
