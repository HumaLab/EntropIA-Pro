name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_platform:
        description: 'Platforms to build from manual dispatch.'
        required: false
        default: 'windows'
        type: choice
        options:
          - windows
          - all

env:
  PNPM_VERSION: 9.15.4
  MACOSX_DEPLOYMENT_TARGET: '10.15'
  CMAKE_OSX_DEPLOYMENT_TARGET: '10.15'
  # LEAN INSTALLER: the ~2.2GB ML runtime is NOT bundled (it overruns the NSIS/WiX
  # 2 GiB bundler limits). The app ships the tiny runtime-pack fixture and downloads
  # the real runtime at first launch from this ed25519-signed source, published by
  # the Publish Runtime Bootstrap workflow. These three vars are read at COMPILE time
  # via option_env!() (settings.rs) and pinned by build.rs rerun-if-env-changed.
  ENTROPIA_RUNTIME_BOOTSTRAP_MANIFEST_URL: https://github.com/HumaLab/EntropIA-Pro/releases/download/runtime-bootstrap/manifest.json
  ENTROPIA_RUNTIME_BOOTSTRAP_PUBLIC_KEY_ID: entropia-runtime-2026
  ENTROPIA_RUNTIME_BOOTSTRAP_PUBLIC_KEY_BASE64: fSt35Xo0XtpdZUH/Q2gsPm1drMZczLMQNcU6fqAEbi0=

jobs:
  build:
    name: Build ${{ matrix.name }}
    permissions:
      contents: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        # Default dispatch + tag pushes build Windows only. `all` adds macOS + Linux.
        include: ${{ fromJSON((github.event_name == 'push' || inputs.release_platform != 'all') && '[{"name":"windows-latest","platform":"windows-latest","build_args":"--bundles nsis","rust_target":""}]' || '[{"name":"windows-latest","platform":"windows-latest","build_args":"--bundles nsis","rust_target":""},{"name":"macos-14 (arm64)","platform":"macos-14","build_args":"--target aarch64-apple-darwin","rust_target":"aarch64-apple-darwin"},{"name":"ubuntu-22.04","platform":"ubuntu-22.04","build_args":"-- --no-default-features","rust_target":""}]') }}
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            pkg-config \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Install Rust target (macOS cross-compilation)
        if: matrix.rust_target != ''
        run: |
          rustup target add ${{ matrix.rust_target }}

      - name: Restore canonical lockfile
        run: git checkout -- pnpm-lock.yaml

      - name: Install frontend dependencies
        shell: pwsh
        run: npm exec --package=pnpm@${{ env.PNPM_VERSION }} -- pnpm install --frozen-lockfile

      # No runtime-pack injection: the committed fixture ships as-is so the app
      # detects "runtime not ready" and bootstraps it from the baked signed source.
      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENTROPIA_RUNTIME_BOOTSTRAP_MANIFEST_URL: ${{ env.ENTROPIA_RUNTIME_BOOTSTRAP_MANIFEST_URL }}
          ENTROPIA_RUNTIME_BOOTSTRAP_PUBLIC_KEY_ID: ${{ env.ENTROPIA_RUNTIME_BOOTSTRAP_PUBLIC_KEY_ID }}
          ENTROPIA_RUNTIME_BOOTSTRAP_PUBLIC_KEY_BASE64: ${{ env.ENTROPIA_RUNTIME_BOOTSTRAP_PUBLIC_KEY_BASE64 }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'EntropIA Pro ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download the EntropIA Pro installer for your platform. The local ML runtime downloads automatically on first launch.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.build_args }}
